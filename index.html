<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主播_文 (WEN) | CPM 改裝美學</title>
    <style>
        :root {
            --primary-color: #ff0050; /* TikTok 風格紅 */
            --bg-color: #121212;
            --text-color: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: var(--text-color); margin: 0; text-align: center; }
        .hero { padding: 50px 20px; background: linear-gradient(to bottom, #222, #000); }
        h1 { color: var(--primary-color); margin-bottom: 10px; }
        .slogan { font-style: italic; font-size: 1.2rem; margin-bottom: 20px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; border-left: 5px solid var(--primary-color); }
        .btn { display: inline-block; padding: 12px 25px; background: var(--primary-color); color: white; text-decoration: none; border-radius: 5px; margin-top: 20px; font-weight: bold; }
        footer { margin-top: 50px; padding: 20px; border-top: 1px solid #333; }
    </style>
</head>
<body>

    <header class="hero">
        <h1>主播_文 (WEN)</h1>
        <p class="slogan">「不僅僅是停車，是我的改裝人生！」</p>
        <a href="https://tiktok.com/@tiktok_wen" class="btn">追蹤我的 TikTok</a>
    </header>

    <main class="content-grid">
        <div class="card">
            <h3>極限停車挑戰</h3>
            <p>精準的駕駛技術，挑戰遊戲中各種高難度停車任務。</p>
        </div>
        <div class="card">
            <h3>創意改裝大師</h3>
            <p>性能調校與痛車設計，打造獨一無二的專屬座駕。</p>
        </div>
        <div class="card">
            <h3>多人互動車聚</h3>
            <p>開放世界連線互動，與粉絲共創汽車交易與競速回憶。</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 WEN CPM Engineering Team. All Rights Reserved.</p>
    </footer>

</body>
</html>
