<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WEN CPM 購物網站</title>

    <!-- WordPress 產生的全域樣式 CSS 區塊 -->
    <style id="global-styles-inline-css">
        :root {
            --wp--preset--color--black: #000000;
            --wp--preset--color--white: #ffffff;
            --wp--preset--color--primary: #337ab7;
            --wp--preset--spacing--small: 20px;
            --wp--preset--spacing--medium: 40px;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            line-height: 1.6;
        }

        .is-layout-constrained {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--wp--preset--spacing--small);
        }

        header, footer {
            padding: var(--wp--preset--spacing--medium);
            background-color: #f4f4f4;
            text-align: center;
        }
    </style>
</head>

<body>
    <!-- 網站頂部 -->
    <header>
        <h1>WEN CPM 購物網站</h1>
    </header>

    <!-- 主要內容區塊 -->
    <main class="is-layout-constrained">
        <section>
            <h2>最新商品</h2>
            <p>歡迎來到我們的購物平台，請瀏覽下方目錄。</p>
        </section>
    </main>

    <!-- 網站底部 -->
    <footer>
        <p>&copy; 2026 WEN CPM Engineering Team.</p>
    </footer>
</body>
</html>
